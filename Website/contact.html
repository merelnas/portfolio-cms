<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merel Nas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-top">
        <h1><a href="/">Merel Nas</a></h1>
        <nav><ul id="sidebar-nav-years"></ul></nav>
        <nav class="nav-bottom"><ul></ul></nav>
      </div>
      <div class="sidebar-bottom">
        <a href="https://instagram.com/merelnas" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
      </div>
    </div>
    <div class="mobile-header">
      <h1><a href="/">Merel Nas</a></h1>
      <label for="menu-toggle" class="menu-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </label>
    </div>
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <div class="mobile-menu">
      <label for="menu-toggle" class="close-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </label>
      <nav><ul id="mobile-nav-years"></ul></nav>
      <nav class="nav-bottom"><ul></ul></nav>
      <div class="mobile-social">
        <a href="https://instagram.com/merelnas" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
      </div>
    </div>
    <main class="main-content">
      <div id="contact-grid"></div>
    </main>
  </div>
  <script src="portfolio-loader.js"></script>

  <!-- Contact modal -->
  <div id="contact-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px">
    <div style="background:#fff;border-radius:12px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid #e4e4e0;display:flex;align-items:center;justify-content:space-between">
        <h2 id="contact-modal-title" style="font-size:15px;font-weight:500">Contact</h2>
        <button onclick="document.getElementById('contact-modal').style.display='none'" style="background:none;border:none;cursor:pointer;font-size:20px;color:#8a8a84;line-height:1">×</button>
      </div>
      <div id="contact-modal-body" style="padding:20px"></div>
    </div>
  </div>
</body>
</html>
